    <div id="root"></div>
    <!-- Google Translate (hidden - controlled via custom switcher) -->
    <div id="google_translate_element" style="display:none;visibility:hidden;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,fr,es,de',
            autoDisplay: false
          },
          'google_translate_element'
        );
      }
      // Keep body from being pushed down by the Google bar
      function fixBodyTop() {
        document.body.style.top = '0px';
        var banner = document.querySelector('.goog-te-banner-frame');
        if (banner) banner.style.display = 'none';
      }
      setInterval(fixBodyTop, 500);
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
